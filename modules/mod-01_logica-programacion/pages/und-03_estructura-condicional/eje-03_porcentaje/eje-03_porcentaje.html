<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eje-03_porcentaje</title>
</head>

<body>
  <script>
    // VARIABLES Y CONSTANTES
    let num100, numX, result;

    // RECIBIR DATOS
    num100 = parseFloat(prompt('INGRESE LA CANTIDAD EQUIVALENTE AL 100%'));
    numX = parseFloat(prompt('INGRESE LA CANTIDAD A CALCULAR'));

    // PROCESAR DATOS
    result = (numX * 100) / num100;

    // MOSTRAR RESULTADO
    alert(numX + ' es el ' + result + ' % de ' + num100);
  </script>
</body>

</html>
