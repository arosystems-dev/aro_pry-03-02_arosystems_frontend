<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eje-01_numero-mayor</title>
</head>

<body>
  <script>
    // VARIABLES Y CONSTANTES
    let num1, num2, result;

    // RECIBIR DATOS
    num1 = parseFloat(prompt('INGRESE EL PRIMER NÚMERO'));
    num2 = parseFloat(prompt('INGRESE EL SEGUNDO NÚMERO'));

    // PROCESAR DATOS
    if (num1 > num2)
      result = num1 + ' > ' + num2;
    else
      result = num1 + ' < ' + num2;

    // MOSTRAR RESULTADO
    alert(result);
  </script>
</body>

</html>
